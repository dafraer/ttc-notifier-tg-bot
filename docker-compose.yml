services:
  bot:
    image: ghcr.io/dafraer/ttc-notifier-tg-bot:latest
    container_name: tbilisi-transport-tg-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override the default so the SQLite file lives on the named volume.
      DATABASE_PATH: /data/bot.db
    volumes:
      - bot-data:/data

volumes:
  bot-data:
